<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08040D">
  <title>GC Player Stats — Last 10 Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
      --yellow:#c6ff00;--yellow-dim:rgba(198,255,0,.22);--blue:#6d28d9;--ink-dark:#08040d;--silver:#c7c2d1;
      --card:rgba(255,255,255,.045);--card-line:rgba(198,255,0,.14);--pad:clamp(12px,3vw,24px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;scroll-padding-top:118px}
    body{font-family:var(--body);font-size:15px;line-height:1.5;min-height:100vh;color:#e9e5f2;
         background:radial-gradient(ellipse 800px 600px at 78% 0%,rgba(109,40,217,.30),transparent 50%),linear-gradient(180deg,#10061d 0%,#1a0a2e 40%,#08040d 100%);background-attachment:fixed}
    a{color:var(--yellow);text-decoration:none}a:hover{text-decoration:underline}
    button{cursor:pointer;font:inherit;color:inherit}
    .wrap{max-width:1120px;margin:0 auto;padding:0 var(--pad) 90px}

    header{padding:clamp(24px,5vw,44px) 0 14px;text-align:center}
    .kicker{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:5px;color:var(--yellow);text-transform:uppercase;margin-bottom:8px}
    h1{font-family:var(--display);font-size:clamp(28px,6vw,54px);font-weight:900;color:#fff;text-transform:uppercase;line-height:1}
    .sub{color:rgba(255,255,255,.6);margin-top:8px;font-size:clamp(12px,1.8vw,13px)}
    .meta{text-align:center;color:rgba(255,255,255,.45);font-size:12px;margin:10px 0 14px}

    /* Sticky control bar */
    .controls{position:sticky;top:0;z-index:50;background:rgba(12,5,22,.92);backdrop-filter:saturate(140%) blur(12px);
      border-bottom:1px solid var(--yellow-dim);margin:0 calc(-1 * var(--pad));padding:10px var(--pad);
      display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .controls input,.controls select{background:rgba(255,255,255,.06);border:1px solid rgba(198,255,0,.25);color:#fff;
      border-radius:8px;padding:10px 12px;font:inherit;min-height:44px}
    .controls input{flex:2 1 180px;min-width:0}
    .controls input::placeholder{color:rgba(255,255,255,.4)}
    .controls select{flex:1 1 140px;min-width:0}
    .ctl-btns{display:flex;gap:6px;flex:1 0 auto;justify-content:flex-end}
    .ctl-btn{background:rgba(255,255,255,.05);border:1px solid rgba(198,255,0,.25);border-radius:8px;
      font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
      color:var(--silver);padding:0 12px;min-height:44px;white-space:nowrap}
    .ctl-btn:hover{color:#fff;border-color:var(--yellow)}
    .ctl-btn.active{background:var(--yellow);color:var(--ink-dark);border-color:var(--yellow)}

    /* Team sections */
    .team-group{margin-top:14px;border:1px solid var(--card-line);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.02)}
    .team-head{width:100%;display:flex;align-items:center;gap:10px;padding:14px var(--pad);background:linear-gradient(90deg,rgba(109,40,217,.28),rgba(109,40,217,.08));
      border:0;text-align:left;min-height:52px}
    .team-head:hover{background:linear-gradient(90deg,rgba(109,40,217,.4),rgba(109,40,217,.12))}
    .team-name{font-family:var(--display);font-size:clamp(16px,3vw,20px);font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--yellow);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .team-counts{font-family:var(--display);font-size:12px;letter-spacing:1px;color:var(--silver);white-space:nowrap}
    .team-counts b{color:#fff}
    .chev{color:rgba(255,255,255,.45);transition:transform .18s;flex-shrink:0;font-size:12px}
    .team-group.open > .team-head .chev{transform:rotate(90deg)}
    .team-body{display:none;padding:10px var(--pad) var(--pad)}
    .team-group.open > .team-body{display:block}

    /* Player cards */
    .player{background:var(--card);border:1px solid var(--card-line);border-radius:12px;margin-bottom:10px;overflow:hidden}
    .player-head{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;border:0;background:transparent;text-align:left;min-height:56px;flex-wrap:wrap}
    .player-head:hover{background:rgba(255,255,255,.04)}
    .p-id{flex:1 1 160px;min-width:0}
    .p-name{font-family:var(--display);font-size:clamp(17px,2.4vw,19px);font-weight:700;color:#fff;letter-spacing:.4px}
    .p-team{font-size:12px;color:var(--silver)}
    .lastseason{font-size:11px;color:rgba(199,194,209,.75)}
    .p-line{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;margin-left:auto}
    .chip{display:inline-flex;flex-direction:column;align-items:center;min-width:46px;padding:4px 8px;border-radius:8px;
      background:rgba(109,40,217,.22);border:1px solid rgba(255,255,255,.08)}
    .chip b{font-family:var(--display);font-size:15px;font-weight:800;color:var(--yellow);line-height:1.1}
    .chip span{font-family:var(--display);font-size:9px;font-weight:600;letter-spacing:1.2px;color:var(--silver);text-transform:uppercase}
    .nogames{font-size:12px;color:rgba(255,255,255,.4)}
    .player.open .chev{transform:rotate(90deg)}
    .games{display:none;padding:0 14px 14px}
    .player.open .games{display:block}

    /* Tables */
    .sec-label{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin:12px 0 6px}
    .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid rgba(255,255,255,.09);border-radius:8px}
    table{border-collapse:collapse;width:100%;font-size:13px}
    th{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--silver);
       background:rgba(109,40,217,.25);padding:8px 10px;text-align:left;white-space:nowrap;position:sticky;left:auto}
    td{padding:7px 10px;border-top:1px solid rgba(255,255,255,.06);white-space:nowrap;color:#ddd6ea}
    td.num,th.num{text-align:center}
    tr:hover td{background:rgba(255,255,255,.03)}
    th:first-child,td:first-child{position:sticky;left:0;background:#160a26;z-index:1}
    tr:hover td:first-child{background:#1c0e30}
    .empty{color:rgba(255,255,255,.45);font-size:13px;padding:10px 2px}
    .loading,.error{text-align:center;padding:60px 20px;color:rgba(255,255,255,.6)}
    .error{color:#ff9c9c}

    /* Back to top */
    #toTop{position:fixed;right:16px;bottom:16px;z-index:60;width:46px;height:46px;border-radius:50%;
      background:var(--yellow);color:var(--ink-dark);border:0;font-size:18px;font-weight:900;
      box-shadow:0 6px 20px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s}
    #toTop.show{opacity:1;pointer-events:auto}

    @media (max-width:640px){
      .p-line{margin-left:0;justify-content:flex-start;width:100%}
      .chip{min-width:42px;padding:3px 7px}
      .chip b{font-size:14px}
      .ctl-btns{flex:1 1 100%;justify-content:stretch}
      .ctl-btn{flex:1}
      .team-counts .players-word{display:none}
      html{scroll-padding-top:160px}
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">NCS Central Texas · GameChanger</div>
    <h1>Player Stats — Last 10 Games</h1>
    <div class="sub">Batting &amp; pitching from each player's current team and last season's team.</div>
    <div class="meta" id="meta"></div>
  </header>

  <div class="controls">
    <input id="search" type="search" placeholder="Search player or team…" aria-label="Search player or team">
    <select id="teamFilter" aria-label="Jump to team"><option value="">All teams</option></select>
    <div class="ctl-btns">
      <button class="ctl-btn" id="statsOnly" aria-pressed="false">Has stats</button>
      <button class="ctl-btn" id="expandAll">Expand all</button>
      <button class="ctl-btn" id="collapseAll">Collapse all</button>
    </div>
  </div>

  <div id="content"><div class="loading">Loading stats…</div></div>
</div>
<button id="toTop" aria-label="Back to top">↑</button>

<script>
const fmt = v => (v === undefined || v === null || v === '') ? '–' : v;
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
// only ever link to http(s) URLs, even if the JSON is edited or corrupted
const safeUrl = u => /^https?:\/\//i.test(String(u || '')) ? String(u) : '#';

function gameRowsHTML(games, section, cols) {
  const withSec = games.filter(g => g[section] && Object.keys(g[section]).length);
  if (!withSec.length) return '';
  const head = `<tr><th>Date</th><th>Team</th><th>Opponent</th>` +
    cols.map(c => `<th class="num">${c}</th>`).join('') + `</tr>`;
  const rows = withSec.map(g => {
    const s = g[section];
    return `<tr><td><a href="${esc(safeUrl(g.source_url))}" target="_blank" rel="noopener">${esc(g.date)}</a></td>` +
      `<td>${esc(fmt(g.team))}</td><td>${esc(fmt(g.opponent))}</td>` +
      cols.map(c => `<td class="num">${esc(fmt(s[c]))}</td>`).join('') + `</tr>`;
  }).join('');
  const label = section === 'batting' ? 'Batting' : 'Pitching';
  return `<div class="sec-label">${label}</div><div class="tbl-scroll"><table>${head}${rows}</table></div>`;
}

function avgStr(v) {
  if (typeof v !== 'number') return fmt(v);
  return v.toFixed(3).replace(/^0/, '');
}

function seasonHTML(p) {
  // one combined stat line per player: their most recent season across teams
  const s = p.season;
  if (!s || (!s.batting && !s.pitching)) return '';
  let html = '';
  if (s.batting) {
    const cols = ['GP','AB','R','H','2B','3B','HR','RBI','BB','SO','SB','AVG'];
    const b = s.batting;
    html += `<div class="sec-label">Season — ${esc(s.label || 'current')}</div>
      <div class="tbl-scroll"><table>
        <tr>${cols.map(c => `<th class="num">${c}</th>`).join('')}</tr>
        <tr>${cols.map(c => `<td class="num">${c === 'AVG' ? avgStr(b.AVG ?? 0) : fmt(b[c])}</td>`).join('')}</tr>
      </table></div>`;
  }
  if (s.pitching) {
    const cols = ['GP','IP','H','R','ER','BB','SO'];
    const pch = s.pitching;
    html += `<div class="sec-label">Season pitching — ${esc(s.label || 'current')}</div>
      <div class="tbl-scroll"><table>
        <tr>${cols.map(c => `<th class="num">${c}</th>`).join('')}</tr>
        <tr>${cols.map(c => `<td class="num">${fmt(pch[c])}</td>`).join('')}</tr>
      </table></div>`;
  }
  return html;
}

function playerHTML(pid, p) {
  const t = p.totals || {};
  const chips = p.games.length
    ? ['GP','AVG','H','HR','RBI'].map(k => {
        const val = k === 'AVG' ? avgStr(t.AVG ?? 0) : (k === 'GP' ? (t.GP ?? p.games.length) : (t[k] ?? 0));
        return `<span class="chip"><b>${val}</b><span>${k}</span></span>`;
      }).join('')
    : `<span class="nogames">no GC games matched</span>`;
  const lastSeason = (p.last_season_teams || []).length
    ? `<div class="lastseason">Last season: ${esc(p.last_season_teams.join(' · '))}</div>` : '';
  const season = seasonHTML(p);
  const batting = gameRowsHTML(p.games, 'batting', ['AB','R','H','2B','3B','HR','RBI','BB','SO','AVG']);
  const pitching = gameRowsHTML(p.games, 'pitching', ['IP','H','R','ER','BB','SO']);
  const body = (season + batting + pitching) || `<div class="empty">No box-score lines found for this player yet.</div>`;
  return `<div class="player" data-pid="${esc(pid)}">
    <button class="player-head" aria-expanded="false" onclick="togglePlayer(this)">
      <span class="chev">▶</span>
      <span class="p-id"><span class="p-name">${esc(p.name)}</span>
        <div class="p-team">${esc(p.roster_team)}</div>${lastSeason}</span>
      <span class="p-line">${chips}</span>
    </button>
    <div class="games">${body}</div>
  </div>`;
}

function togglePlayer(btn) {
  const card = btn.parentElement;
  card.classList.toggle('open');
  btn.setAttribute('aria-expanded', card.classList.contains('open'));
}
function toggleTeam(btn) {
  const grp = btn.parentElement;
  grp.classList.toggle('open');
  btn.setAttribute('aria-expanded', grp.classList.contains('open'));
}

let DATA = null;

function render(opts = {}) {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const teamSel = document.getElementById('teamFilter').value;
  const statsOnly = document.getElementById('statsOnly').classList.contains('active');
  const byTeam = {};
  for (const [pid, p] of Object.entries(DATA.players)) {
    const team = p.roster_team || 'Unknown team';
    if (teamSel && team !== teamSel) continue;
    if (statsOnly && !p.games.length) continue;
    const hay = (p.name + ' ' + team + ' ' + (p.last_season_teams || []).join(' ')).toLowerCase();
    if (q && !hay.includes(q)) continue;
    (byTeam[team] = byTeam[team] || []).push([pid, p]);
  }
  const teams = Object.keys(byTeam).sort();
  // auto-open when searching/filtering or when there's only one team
  const autoOpen = !!q || !!teamSel || teams.length === 1 || opts.forceOpen === true;
  const forceClosed = opts.forceOpen === false;
  const html = teams.map(team => {
    const players = byTeam[team].sort((a, b) =>
      (b[1].games.length - a[1].games.length) || a[1].name.localeCompare(b[1].name));
    const withStats = players.filter(([, p]) => p.games.length).length;
    const open = forceClosed ? false : autoOpen;
    return `<div class="team-group${open ? ' open' : ''}" data-team="${esc(team)}">
      <button class="team-head" aria-expanded="${open}" onclick="toggleTeam(this)">
        <span class="chev">▶</span>
        <span class="team-name">${esc(team)}</span>
        <span class="team-counts"><b>${players.length}</b><span class="players-word"> players</span> · <b>${withStats}</b> w/ stats</span>
      </button>
      <div class="team-body">` +
      players.map(([pid, p]) => playerHTML(pid, p)).join('') + `</div></div>`;
  }).join('');
  document.getElementById('content').innerHTML =
    html || `<div class="loading">No players match.</div>`;
}

fetch('reports/gc-player-stats.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    DATA = data;
    const withStats = Object.values(data.players).filter(p => p.games.length).length;
    document.getElementById('meta').textContent =
      `Updated ${new Date(data.generated_at).toLocaleString()} · ` +
      `${Object.keys(data.players).length} players · ${withStats} with stats · ` +
      `${Object.keys(data.teams_scraped || {}).length} GC teams scraped`;
    const sel = document.getElementById('teamFilter');
    [...new Set(Object.values(data.players).map(p => p.roster_team).filter(Boolean))].sort()
      .forEach(t => sel.insertAdjacentHTML('beforeend', `<option>${esc(t)}</option>`));
    document.getElementById('search').addEventListener('input', () => render());
    sel.addEventListener('change', () => render());
    document.getElementById('statsOnly').addEventListener('click', e => {
      e.currentTarget.classList.toggle('active');
      e.currentTarget.setAttribute('aria-pressed', e.currentTarget.classList.contains('active'));
      render();
    });
    document.getElementById('expandAll').addEventListener('click', () => {
      render({forceOpen: true});
      document.querySelectorAll('.player').forEach(p => {
        p.classList.add('open');
        p.querySelector('.player-head').setAttribute('aria-expanded', 'true');
      });
    });
    document.getElementById('collapseAll').addEventListener('click', () => render({forceOpen: false}));
    render();
  })
  .catch(err => {
    document.getElementById('content').innerHTML =
      `<div class="error">Could not load reports/gc-player-stats.json (${err.message}).<br>
       Run <code>python gc_player_stats.py</code> first, and serve this folder over HTTP
       (e.g. <code>python3 -m http.server</code>) rather than opening the file directly.</div>`;
  });

const toTop = document.getElementById('toTop');
addEventListener('scroll', () => toTop.classList.toggle('show', scrollY > 600), {passive: true});
toTop.addEventListener('click', () => scrollTo({top: 0, behavior: 'smooth'}));
</script>
</body>
</html>
