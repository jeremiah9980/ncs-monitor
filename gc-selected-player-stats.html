<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GC Selected Player Stats</title><style>body{font-family:Arial,sans-serif;background:#0b0612;color:#eee;margin:0;padding:24px}a{color:#c6ff00}.wrap{max-width:1100px;margin:auto}h1{font-size:42px;margin:0 0 8px}.card{border:1px solid rgba(198,255,0,.25);border-radius:14px;margin:14px 0;padding:16px;background:rgba(255,255,255,.05)}table{border-collapse:collapse;width:100%;margin-top:10px}th,td{border-top:1px solid rgba(255,255,255,.12);padding:7px;text-align:left;white-space:nowrap}.num{text-align:center}.scroll{overflow-x:auto}.muted{color:#aaa}.error{color:#ffaaa8}</style></head><body><div class="wrap"><h1>Selected Player Stats</h1><p class="muted">Batting and pitching for Jordyn Haynes, Brooklyn Franco, Maisy Finlestein, and Abigail Holland.</p><p><a href="gc-player-stats.html">All Player Stats</a> · <a href="gc-leaderboard.html">Leaderboards</a></p><div id="app">Loading…</div></div><script>
const url='reports/gc-specific-player-stats-starter.json';
const e=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const f=v=>(v===undefined||v===null||v==='')?'–':v;
function rows(games,type){const cols=type==='batting'?['AB','R','H','2B','3B','HR','RBI','BB','SO','SB','AVG']:['IP','H','R','ER','BB','SO','HR'];const data=(games||[]).filter(g=>g[type]);if(!data.length)return '<p class="muted">No '+type+' lines found.</p>';return '<div class="scroll"><table><tr><th>Date</th><th>Team</th><th>Opponent</th>'+cols.map(c=>'<th class="num">'+c+'</th>').join('')+'</tr>'+data.map(g=>'<tr><td><a target="_blank" href="'+e(g.source_url||'#')+'">'+e(g.date)+'</a></td><td>'+e(g.team||g.gc_team||'')+'</td><td>'+e(g.opponent||'')+'</td>'+cols.map(c=>'<td class="num">'+e(f(g[type][c]))+'</td>').join('')+'</tr>').join('')+'</table></div>'}
fetch(url).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(d=>{const players=Object.values(d.players||{});document.getElementById('app').innerHTML=players.length?players.map(p=>'<div class="card"><h2>'+e(p.name)+'</h2><p class="muted">'+e(p.roster_team||'')+'</p><h3>Batting</h3>'+rows(p.games,'batting')+'<h3>Pitching</h3>'+rows(p.games,'pitching')+'</div>').join(''):'<div class="card"><b>No player data yet.</b><p>Run <code>./export_gc_selected.sh</code> after <code>gc_stats.db</code> has these players, then publish the generated JSON.</p><p>Selected: '+e((d.selected_names||[]).join(', '))+'</p></div>'}).catch(err=>{document.getElementById('app').innerHTML='<p class="error">Could not load '+url+' ('+e(err.message)+').</p>'});
</script></body></html>
