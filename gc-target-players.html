<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08040D">
  <title>GC Target Player Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--yellow:#c6ff00;--yellow-dim:rgba(198,255,0,.22);--blue:#6d28d9;--ink-dark:#08040d;--silver:#c7c2d1;--card:rgba(255,255,255,.045);--card-line:rgba(198,255,0,.14);--pad:clamp(12px,3vw,24px)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth;scroll-padding-top:118px}
    body{font-family:var(--body);font-size:15px;line-height:1.5;min-height:100vh;color:#e9e5f2;background:radial-gradient(ellipse 800px 600px at 78% 0%,rgba(109,40,217,.30),transparent 50%),linear-gradient(180deg,#10061d 0%,#1a0a2e 40%,#08040d 100%);background-attachment:fixed}
    a{color:var(--yellow);text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:1120px;margin:0 auto;padding:0 var(--pad) 90px}
    header{padding:clamp(24px,5vw,44px) 0 14px;text-align:center}.kicker{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:5px;color:var(--yellow);text-transform:uppercase;margin-bottom:8px}
    h1{font-family:var(--display);font-size:clamp(30px,7vw,60px);font-weight:900;color:#fff;text-transform:uppercase;line-height:.95}.sub{color:rgba(255,255,255,.63);margin-top:9px;font-size:clamp(12px,1.8vw,14px)}.meta{text-align:center;color:rgba(255,255,255,.48);font-size:12px;margin:10px 0 14px}
    .toplinks{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:12px 0 4px}.pill-link{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;border:1px solid rgba(198,255,0,.25);border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.04);color:var(--silver)}.pill-link:hover{border-color:var(--yellow);color:#fff;text-decoration:none}
    .controls{position:sticky;top:0;z-index:50;background:rgba(12,5,22,.94);backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--yellow-dim);margin:0 calc(-1 * var(--pad));padding:10px var(--pad);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .controls input,.controls select{background:rgba(255,255,255,.06);border:1px solid rgba(198,255,0,.25);color:#fff;border-radius:8px;padding:10px 12px;font:inherit;min-height:44px}.controls input{flex:2 1 220px;min-width:0}.controls select{flex:1 1 180px}
    .missing{margin:14px 0;padding:12px 14px;border:1px solid rgba(255,156,156,.28);background:rgba(255,80,80,.08);border-radius:12px;color:#ffc0c0}
    .player-card{margin-top:16px;border:1px solid var(--card-line);border-radius:16px;overflow:hidden;background:var(--card);box-shadow:0 18px 60px rgba(0,0,0,.18)}
    .player-head{padding:16px;background:linear-gradient(90deg,rgba(109,40,217,.35),rgba(109,40,217,.08));display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}.player-name{font-family:var(--display);font-size:clamp(24px,5vw,36px);font-weight:900;line-height:1;color:#fff;text-transform:uppercase}.player-team{color:var(--silver);font-size:13px;margin-top:4px}.player-tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:8px 12px;border-radius:999px;border:1px solid rgba(198,255,0,.25);background:rgba(255,255,255,.04);color:var(--silver)}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px;padding:14px}.chip{background:rgba(109,40,217,.22);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px;text-align:center}.chip b{font-family:var(--display);font-size:22px;color:var(--yellow);line-height:1}.chip span{display:block;font-family:var(--display);font-size:10px;letter-spacing:1.2px;color:var(--silver);text-transform:uppercase;margin-top:3px}
    .section{padding:0 14px 14px}.section h2{font-family:var(--display);font-size:16px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin:10px 0 6px}.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid rgba(255,255,255,.09);border-radius:10px}table{border-collapse:collapse;width:100%;font-size:13px}th{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--silver);background:rgba(109,40,217,.22);padding:8px 10px;text-align:left;white-space:nowrap}td{padding:8px 10px;border-top:1px solid rgba(255,255,255,.06);white-space:nowrap;color:#ddd6ea}td.num,th.num{text-align:center}tr:hover td{background:rgba(255,255,255,.035)}.empty,.loading,.error{text-align:center;padding:60px 20px;color:rgba(255,255,255,.6)}.error{color:#ff9c9c}.hidden{display:none!important}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">NCS Central Texas · GameChanger</div>
    <h1>Target Player Stats</h1>
    <div class="sub">Batting and pitching report for selected players only.</div>
    <div class="toplinks"><a class="pill-link" href="gc-player-stats.html">All Player Stats</a><a class="pill-link" href="gc-leaderboard.html">Leaderboards</a></div>
    <div class="meta" id="meta"></div>
  </header>
  <div class="controls">
    <input id="search" type="search" placeholder="Search these players…" aria-label="Search players">
    <select id="period"><option value="overall">Overall</option><option value="season_totals">Per Season</option><option value="year_totals">Per Year</option></select>
  </div>
  <div id="missing"></div>
  <div id="content"><div class="loading">Loading target players…</div></div>
</div>
<script>
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=v=>(v===undefined||v===null||v==='')?'–':v;const avgStr=v=>typeof v==='number'?v.toFixed(3).replace(/^0/,''):fmt(v);
let DATA=null;
function chips(stats, cols){return cols.map(c=>`<div class="chip"><b>${esc(c==='AVG'?avgStr(stats[c]):fmt(stats[c]))}</b><span>${esc(c)}</span></div>`).join('')}
function totalsTable(label, totals){const bat=totals.batting||{}, pit=totals.pitching||{};return `<div class="section"><h2>${esc(label)} Totals</h2><div class="stat-grid">${chips(bat,['GP','AB','R','H','2B','3B','HR','RBI','BB','SO','SB','AVG'])}${chips(pit,['GP','IP','H','R','ER','BB','SO','HR'])}</div></div>`}
function gamesTable(games){const rows=(games||[]).map(g=>{const b=g.batting||{},p=g.pitching||{};return `<tr><td><a href="${esc(g.source_url||'#')}" target="_blank" rel="noopener">${esc(g.date)}</a></td><td>${esc(g.team)}</td><td>${esc(g.opponent)}</td><td>${esc(g.season)}</td><td class="num">${esc(fmt(b.AB))}</td><td class="num">${esc(fmt(b.H))}</td><td class="num">${esc(fmt(b['2B']))}</td><td class="num">${esc(fmt(b['3B']))}</td><td class="num">${esc(fmt(b.HR))}</td><td class="num">${esc(fmt(b.RBI))}</td><td class="num">${esc(fmt(b.AVG))}</td><td class="num">${esc(fmt(p.IP))}</td><td class="num">${esc(fmt(p.SO))}</td><td class="num">${esc(fmt(p.ER))}</td></tr>`}).join('');return `<div class="section"><h2>Recent Game Lines</h2><div class="tbl-scroll"><table><tr><th>Date</th><th>Team</th><th>Opponent</th><th>Season</th><th class="num">AB</th><th class="num">H</th><th class="num">2B</th><th class="num">3B</th><th class="num">HR</th><th class="num">RBI</th><th class="num">AVG</th><th class="num">IP</th><th class="num">K</th><th class="num">ER</th></tr>${rows||'<tr><td colspan="14" class="empty">No game lines found yet.</td></tr>'}</table></div></div>`}
function playerHTML(p){const period=document.getElementById('period').value;let html=`<article class="player-card"><div class="player-head"><div><div class="player-name">${esc(p.name)}</div><div class="player-team">${esc(p.roster_team||'')} ${p.last_season_teams?.length?'· Last season: '+esc(p.last_season_teams.join(' · ')):''}</div></div><div class="player-tabs"><span class="tab">${esc((p.games||[]).length)} game lines</span></div></div>`;if(period==='overall'){html+=totalsTable('Overall',p.overall||{})}else{const groups=p[period]||{};Object.keys(groups).forEach(k=>html+=totalsTable(k,groups[k]))}html+=gamesTable(p.games||[]);return html+'</article>'}
function render(){const q=document.getElementById('search').value.trim().toLowerCase();const players=Object.values(DATA.players||{}).filter(p=>(p.name+' '+(p.roster_team||'')).toLowerCase().includes(q));document.getElementById('content').innerHTML=players.length?players.map(playerHTML).join(''):'<div class="empty">No target players match.</div>'}
fetch('reports/gc-target-player-stats.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(data=>{DATA=data;document.getElementById('meta').textContent=`Updated ${new Date(data.generated_at).toLocaleString()} · ${Object.keys(data.players||{}).length}/${(data.targets||[]).length} target players found`;document.getElementById('missing').innerHTML=(data.missing||[]).length?`<div class="missing">Missing from local DB: ${esc(data.missing.join(', '))}</div>`:'';document.getElementById('search').addEventListener('input',render);document.getElementById('period').addEventListener('change',render);render()}).catch(err=>{document.getElementById('content').innerHTML=`<div class="error">Could not load reports/gc-target-player-stats.json (${esc(err.message)}).<br>Run <code>./export_gc_target_players.sh</code> after <code>gc_stats.db</code> exists, then serve this folder over HTTP.</div>`});
</script>
</body>
</html>
