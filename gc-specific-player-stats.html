<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GC Selected Player Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--yellow:#c6ff00;--purple:#6d28d9;--line:rgba(198,255,0,.16);--card:rgba(255,255,255,.045);--silver:#c7c2d1;--ink:#08040d;--pad:clamp(12px,3vw,24px)}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--body);min-height:100vh;color:#eee;background:radial-gradient(ellipse 800px 600px at 80% 0%,rgba(109,40,217,.32),transparent 50%),linear-gradient(180deg,#10061d,#08040d)}a{color:var(--yellow);text-decoration:none}.wrap{max-width:1120px;margin:0 auto;padding:28px var(--pad) 80px}header{text-align:center;margin-bottom:18px}.kicker{font-family:var(--display);font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--yellow)}h1{font-family:var(--display);font-size:clamp(32px,7vw,62px);line-height:.95;text-transform:uppercase}.sub,.meta{color:rgba(255,255,255,.6);font-size:13px;margin-top:8px}.links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0}.links a{border:1px solid var(--line);border-radius:999px;padding:8px 13px;font-family:var(--display);font-size:12px;letter-spacing:1.4px;text-transform:uppercase;color:var(--silver)}.controls{position:sticky;top:0;background:rgba(12,5,22,.94);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:12px;padding:10px;display:flex;gap:8px;flex-wrap:wrap;z-index:20}.controls input,.controls select{background:rgba(255,255,255,.06);border:1px solid rgba(198,255,0,.22);border-radius:8px;color:#fff;padding:10px 12px;min-height:42px}.controls input{flex:2 1 220px}.controls select{flex:1 1 150px}.player{margin-top:16px;border:1px solid var(--line);border-radius:15px;background:var(--card);overflow:hidden}.head{padding:15px 16px;background:linear-gradient(90deg,rgba(109,40,217,.32),rgba(109,40,217,.08));display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.name{font-family:var(--display);font-size:27px;font-weight:900;color:#fff;text-transform:uppercase}.team{color:var(--silver);font-size:13px}.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{min-width:56px;text-align:center;border:1px solid rgba(255,255,255,.09);background:rgba(109,40,217,.22);border-radius:9px;padding:5px 8px}.chip b{display:block;font-family:var(--display);font-size:18px;color:var(--yellow);line-height:1}.chip span{font-family:var(--display);font-size:10px;letter-spacing:1.1px;color:var(--silver);text-transform:uppercase}.section{padding:12px 16px}.label{font-family:var(--display);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);margin:8px 0}.tbl{overflow-x:auto;border:1px solid rgba(255,255,255,.08);border-radius:9px}table{width:100%;border-collapse:collapse;font-size:13px}th{font-family:var(--display);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--silver);background:rgba(109,40,217,.25);padding:8px 10px;text-align:left;white-space:nowrap}td{padding:8px 10px;border-top:1px solid rgba(255,255,255,.06);white-space:nowrap}.num{text-align:center}.empty,.error,.loading{text-align:center;color:rgba(255,255,255,.6);padding:50px 20px}.error{color:#ffaaa8}@media(max-width:700px){.head{display:block}.chips{margin-top:10px}}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">NCS Central Texas · GameChanger</div>
    <h1>Selected Player Stats</h1>
    <div class="sub">Batting and pitching lines for Jordyn Haynes, Brooklyn Franco, Maisy Finlestein, and Abigail Holland.</div>
    <div class="links"><a href="gc-player-stats.html">All Player Stats</a><a href="gc-leaderboard.html">Leaderboards</a></div>
    <div class="meta" id="meta"></div>
  </header>
  <div class="controls"><input id="search" type="search" placeholder="Search player, team, opponent…"><select id="section"><option value="all">Batting + Pitching</option><option value="batting">Batting only</option><option value="pitching">Pitching only</option></select></div>
  <div id="content"><div class="loading">Loading selected players…</div></div>
</div>
<script>
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=v=>(v===undefined||v===null||v==='')?'–':v;
const avg=v=>typeof v==='number'?v.toFixed(3).replace(/^0/,''):fmt(v);
let DATA=null;
function chips(p){const b=p.totals?.batting||{}, pi=p.totals?.pitching||{};return `<div class="chips"><span class="chip"><b>${fmt(b.GP)}</b><span>G</span></span><span class="chip"><b>${avg(b.AVG)}</b><span>AVG</span></span><span class="chip"><b>${fmt(b.H)}</b><span>H</span></span><span class="chip"><b>${fmt(b.RBI)}</b><span>RBI</span></span><span class="chip"><b>${fmt(pi.IP)}</b><span>IP</span></span><span class="chip"><b>${fmt(pi.SO)}</b><span>K</span></span></div>`}
function table(games,type){let rows=games.filter(g=>g[type]);if(!rows.length)return `<div class="empty">No ${type} lines found.</div>`;let cols=type==='batting'?['AB','R','H','2B','3B','HR','RBI','BB','SO','SB','AVG']:['IP','H','R','ER','BB','SO','HR'];return `<div class="tbl"><table><tr><th>Date</th><th>Team</th><th>Opponent</th>${cols.map(c=>`<th class="num">${c}</th>`).join('')}</tr>${rows.map(g=>`<tr><td><a href="${esc(g.source_url||'#')}" target="_blank" rel="noopener">${esc(g.date)}</a></td><td>${esc(g.team||g.gc_team||'')}</td><td>${esc(g.opponent||'')}</td>${cols.map(c=>`<td class="num">${esc(fmt(g[type][c]))}</td>`).join('')}</tr>`).join('')}</table></div>`}
function card(p){const mode=document.getElementById('section').value;return `<section class="player"><div class="head"><div><div class="name">${esc(p.name)}</div><div class="team">${esc(p.roster_team||'')}</div></div>${chips(p)}</div><div class="section">${mode!=='pitching'?`<div class="label">Batting</div>${table(p.games||[],'batting')}`:''}${mode!=='batting'?`<div class="label">Pitching</div>${table(p.games||[],'pitching')}`:''}</div></section>`}
function render(){const q=document.getElementById('search').value.trim().toLowerCase();const players=Object.values(DATA.players||{}).filter(p=>!q||(`${p.name} ${p.roster_team} ${(p.games||[]).map(g=>`${g.team} ${g.opponent}`).join(' ')}`).toLowerCase().includes(q));document.getElementById('content').innerHTML=players.length?players.map(card).join(''):'<div class="empty">No selected players match.</div>'}
fetch('reports/gc-specific-player-stats.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(data=>{DATA=data;document.getElementById('meta').textContent=`Updated ${new Date(data.generated_at).toLocaleString()} · ${Object.keys(data.players||{}).length} players · missing: ${(data.missing_names||[]).join(', ')||'none'}`;document.getElementById('search').addEventListener('input',render);document.getElementById('section').addEventListener('change',render);render()}).catch(e=>{document.getElementById('content').innerHTML=`<div class="error">Could not load reports/gc-specific-player-stats.json (${esc(e.message)}). Run ./export_gc_selected.sh after gc_stats.db exists.</div>`});
</script>
</body>
</html>
