<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08040D">
  <title>Coach Command Center · GameChanger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--yellow:#c6ff00;--purple:#6d28d9;--bg:#08040d;--card:rgba(255,255,255,.05);--line:rgba(198,255,0,.16);--muted:#c7c2d1;--pad:clamp(12px,3vw,24px)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--body);background:radial-gradient(900px 600px at 80% -10%,rgba(109,40,217,.34),transparent 55%),linear-gradient(180deg,#120720,#08040d);color:#eee8fa;min-height:100vh}a{color:var(--yellow);text-decoration:none}.wrap{max-width:1240px;margin:auto;padding:0 var(--pad) 80px}header{text-align:center;padding:34px 0 16px}.kicker{font-family:var(--display);font-size:12px;letter-spacing:4px;color:var(--yellow);text-transform:uppercase}h1{font-family:var(--display);font-size:clamp(34px,7vw,72px);line-height:.92;text-transform:uppercase;color:#fff;margin-top:6px}.sub{color:rgba(255,255,255,.62);margin-top:10px}.toplinks{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px}.pill{font-family:var(--display);font-weight:800;font-size:12px;letter-spacing:1.3px;text-transform:uppercase;border:1px solid rgba(198,255,0,.25);border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.04);color:var(--muted)}.pill:hover{border-color:var(--yellow);color:#fff}.controls{position:sticky;top:0;z-index:20;margin:0 calc(-1 * var(--pad));padding:10px var(--pad);background:rgba(10,4,18,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px);display:flex;gap:8px;flex-wrap:wrap}.controls input,.controls select{background:rgba(255,255,255,.06);border:1px solid rgba(198,255,0,.25);border-radius:9px;color:#fff;min-height:44px;padding:10px 12px;font:inherit}.controls input{flex:2 1 230px}.controls select{flex:1 1 170px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:16px 0}.card,.team{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 55px rgba(0,0,0,.18)}.card{padding:14px}.card b{font-family:var(--display);font-size:32px;color:var(--yellow);display:block;line-height:1}.card span{font-family:var(--display);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px}.team{overflow:hidden}.team-head{padding:16px;background:linear-gradient(90deg,rgba(109,40,217,.34),rgba(109,40,217,.08));display:flex;justify-content:space-between;gap:12px}.team-title{font-family:var(--display);font-size:24px;text-transform:uppercase;font-weight:900;color:#fff;line-height:1}.team-title span{color:var(--yellow)}.team-meta{font-size:12px;color:var(--muted);margin-top:3px}.score{font-family:var(--display);font-size:34px;font-weight:900;color:var(--yellow);text-align:right}.score small{display:block;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}.team-body{padding:14px}.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.mini div{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:9px;text-align:center}.mini b{font-family:var(--display);font-size:20px;color:#fff;display:block}.mini span{font-family:var(--display);font-size:10px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted)}table{width:100%;border-collapse:collapse;font-size:13px}th{font-family:var(--display);font-size:11px;text-transform:uppercase;letter-spacing:1.1px;color:var(--muted);text-align:left;background:rgba(109,40,217,.20);padding:7px}td{border-top:1px solid rgba(255,255,255,.06);padding:7px;white-space:nowrap}td.num,th.num{text-align:center}.player{font-weight:700;color:#fff}.tag{display:inline-block;border:1px solid rgba(198,255,0,.2);border-radius:999px;padding:2px 7px;font-size:11px;color:var(--yellow);margin:2px 4px 2px 0}.empty,.loading,.error{text-align:center;padding:50px 18px;color:rgba(255,255,255,.6)}.error{color:#ff9c9c}@media(max-width:680px){.grid{grid-template-columns:1fr}.mini{grid-template-columns:repeat(2,1fr)}.team-head{flex-direction:column}.score{text-align:left}}
  </style>
</head>
<body><div class="wrap">
  <header><div class="kicker">Central Texas · Georgetown · Leander · Round Rock</div><h1>Coach Command Center</h1><div class="sub">Team health, production leaders, run creators, contact bats, and pitching value from GameChanger stats.</div><div class="toplinks"><a class="pill" href="gc-lineup-builder.html">Lineup Builder</a><a class="pill" href="gc-development-watch.html">Development Watch</a><a class="pill" href="gc-leaderboard.html">Leaderboards</a><a class="pill" href="gc-player-stats.html">Player Stats</a></div><div class="sub" id="meta"></div></header>
  <div class="controls"><input id="search" type="search" placeholder="Search team or player…"><select id="age"><option value="">All age groups</option><option>10U</option><option>12U</option><option>14U</option></select><select id="sort"><option value="score">Sort: coach score</option><option value="avg">Sort: team AVG</option><option value="power">Sort: power</option><option value="players">Sort: players</option><option value="games">Sort: games</option></select></div>
  <div class="summary" id="summary"></div><div id="content"><div class="loading">Loading coach dashboard…</div></div>
</div><script>
const esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));const num=v=>Number(v||0);const avg=v=>num(v).toFixed(3).replace(/^0/,'');
function playerTeams(p){return [...new Set([p.roster_team,...(p.current_teams||[]),...(p.last_season_teams||[])].filter(Boolean))]}
function hasAge(name,age){return !age || String(name).toUpperCase().includes(age)}
function buildTeams(data){const teams={};Object.entries(data.teams_scraped||{}).forEach(([url,t])=>{const label=(t.ncs_teams&&t.ncs_teams[0])||t.gc_name||url;teams[label] ||= {name:label,gc_name:t.gc_name||label,games:num(t.games),players:[],url};});Object.values(data.players||{}).forEach(p=>{const t=p.totals||{};playerTeams(p).forEach(team=>{teams[team] ||= {name:team,gc_name:team,games:0,players:[],url:''};teams[team].players.push({...p,totals:t});});});return Object.values(teams).map(t=>{const active=t.players.filter(p=>num(p.totals.GP)>0);const ab=active.reduce((a,p)=>a+num(p.totals.AB),0);const hits=active.reduce((a,p)=>a+num(p.totals.H),0);const hr=active.reduce((a,p)=>a+num(p.totals.HR),0);const xbh=active.reduce((a,p)=>a+num(p.totals['2B'])+num(p.totals['3B'])+num(p.totals.HR),0);const rbi=active.reduce((a,p)=>a+num(p.totals.RBI),0);const sb=active.reduce((a,p)=>a+num(p.totals.SB),0);const bb=active.reduce((a,p)=>a+num(p.totals.BB),0);const so=active.reduce((a,p)=>a+num(p.totals.SO),0);const teamAvg=ab?hits/ab:0;const contact=ab?1-(so/ab):0;const score=Math.round((teamAvg*120)+(xbh*2)+(hr*4)+(rbi*.75)+(sb*.8)+(contact*20));return {...t,active,ab,hits,hr,xbh,rbi,sb,bb,so,avg:teamAvg,contact,score};});}
function topRows(team,type){let rows=[...team.active];if(type==='impact')rows.sort((a,b)=>impact(b)-impact(a));if(type==='contact')rows.sort((a,b)=>contactScore(b)-contactScore(a));if(type==='speed')rows.sort((a,b)=>speedScore(b)-speedScore(a));return rows.slice(0,5).map(p=>`<tr><td><div class="player">${esc(p.name)}</div></td><td class="num">${num(p.totals.GP)}</td><td class="num">${avg(p.totals.AVG)}</td><td class="num">${num(p.totals.H)}</td><td class="num">${num(p.totals.HR)}</td><td class="num">${num(p.totals.RBI)}</td><td class="num">${num(p.totals.SB)}</td></tr>`).join('')||'<tr><td colspan="7" class="empty">No matched player stats yet.</td></tr>'}
function impact(p){const t=p.totals||{};return num(t.H)*1.5+num(t['2B'])*2+num(t['3B'])*3+num(t.HR)*5+num(t.RBI)*1.2+num(t.R)*.8+num(t.BB)}function contactScore(p){const t=p.totals||{};return num(t.AB)?(num(t.H)/num(t.AB))*100 - (num(t.SO)/Math.max(1,num(t.AB)))*20 + num(t.BB):0}function speedScore(p){const t=p.totals||{};return num(t.SB)*3+num(t.R)+num(t['3B'])*2}
function teamCard(t){return `<section class="team"><div class="team-head"><div><div class="team-title"><span>${esc(ageLabel(t.name))}</span> ${esc(t.name)}</div><div class="team-meta">${esc(t.gc_name)} · ${t.games||0} scraped games · ${t.active.length}/${t.players.length} players with stats</div></div><div class="score">${t.score}<small>coach score</small></div></div><div class="team-body"><div class="mini"><div><b>${avg(t.avg)}</b><span>Team AVG</span></div><div><b>${t.xbh}</b><span>XBH</span></div><div><b>${t.rbi}</b><span>RBI</span></div><div><b>${t.sb}</b><span>SB</span></div></div><div><span class="tag">Impact bats</span><span class="tag">Contact bats</span><span class="tag">Speed pressure</span></div><table><tr><th>Top Player</th><th class="num">GP</th><th class="num">AVG</th><th class="num">H</th><th class="num">HR</th><th class="num">RBI</th><th class="num">SB</th></tr>${topRows(t,'impact')}</table></div></section>`}
function ageLabel(name){const m=String(name).match(/\b(8U|9U|10U|11U|12U|13U|14U|16U|18U)\b/i);return m?m[1].toUpperCase():'TEAM'}
let TEAMS=[];function render(){const q=document.getElementById('search').value.toLowerCase();const age=document.getElementById('age').value;const sort=document.getElementById('sort').value;let rows=TEAMS.filter(t=>(!q||(`${t.name} ${t.gc_name} ${t.players.map(p=>p.name).join(' ')}`).toLowerCase().includes(q))&&hasAge(`${t.name} ${t.gc_name}`,age));rows.sort((a,b)=>sort==='avg'?b.avg-a.avg:sort==='power'?b.xbh-a.xbh:sort==='players'?b.active.length-a.active.length:sort==='games'?b.games-a.games:b.score-a.score);document.getElementById('summary').innerHTML=`<div class="card"><b>${rows.length}</b><span>Teams Showing</span></div><div class="card"><b>${rows.reduce((a,t)=>a+t.active.length,0)}</b><span>Players With Stats</span></div><div class="card"><b>${rows.reduce((a,t)=>a+t.games,0)}</b><span>Scraped Games</span></div><div class="card"><b>${rows.reduce((a,t)=>a+t.hr,0)}</b><span>Total HR</span></div><div class="card"><b>${rows.reduce((a,t)=>a+t.sb,0)}</b><span>Total SB</span></div>`;document.getElementById('content').innerHTML=`<div class="grid">${rows.map(teamCard).join('')}</div>`||'<div class="empty">No teams match.</div>'}
fetch('reports/gc-player-stats.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(data=>{TEAMS=buildTeams(data);document.getElementById('meta').textContent=`Updated ${new Date(data.generated_at).toLocaleString()} · max games/player ${data.max_games||'all'}`;['search','age','sort'].forEach(id=>document.getElementById(id).addEventListener(id==='search'?'input':'change',render));render();}).catch(e=>document.getElementById('content').innerHTML=`<div class="error">Could not load reports/gc-player-stats.json (${esc(e.message)}). Run the GameChanger scrape/export first.</div>`);
</script></body></html>
