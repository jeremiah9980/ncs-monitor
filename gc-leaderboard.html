<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08040D">
  <title>GC Player Leaderboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--yellow:#c6ff00;--yellow-dim:rgba(198,255,0,.22);--blue:#6d28d9;--ink-dark:#08040d;--silver:#c7c2d1;--card:rgba(255,255,255,.045);--card-line:rgba(198,255,0,.14);--pad:clamp(12px,3vw,24px)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;scroll-padding-top:128px}
    body{font-family:var(--body);font-size:15px;line-height:1.5;min-height:100vh;color:#e9e5f2;background:radial-gradient(ellipse 800px 600px at 78% 0%,rgba(109,40,217,.30),transparent 50%),linear-gradient(180deg,#10061d 0%,#1a0a2e 40%,#08040d 100%);background-attachment:fixed}
    a{color:var(--yellow);text-decoration:none}a:hover{text-decoration:underline}
    button{cursor:pointer;font:inherit;color:inherit}
    .wrap{max-width:1180px;margin:0 auto;padding:0 var(--pad) 90px}
    header{padding:clamp(24px,5vw,44px) 0 14px;text-align:center}
    .kicker{font-family:var(--display);font-size:11px;font-weight:600;letter-spacing:5px;color:var(--yellow);text-transform:uppercase;margin-bottom:8px}
    h1{font-family:var(--display);font-size:clamp(32px,7vw,64px);font-weight:900;color:#fff;text-transform:uppercase;line-height:.95}
    .sub{color:rgba(255,255,255,.63);margin-top:9px;font-size:clamp(12px,1.8vw,14px)}
    .meta{text-align:center;color:rgba(255,255,255,.48);font-size:12px;margin:10px 0 14px}
    .toplinks{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:12px 0 4px}
    .pill-link{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;border:1px solid rgba(198,255,0,.25);border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.04);color:var(--silver)}
    .pill-link:hover{border-color:var(--yellow);color:#fff;text-decoration:none}
    .controls{position:sticky;top:0;z-index:50;background:rgba(12,5,22,.94);backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--yellow-dim);margin:0 calc(-1 * var(--pad));padding:10px var(--pad);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .controls input,.controls select{background:rgba(255,255,255,.06);border:1px solid rgba(198,255,0,.25);color:#fff;border-radius:8px;padding:10px 12px;font:inherit;min-height:44px}
    .controls input{flex:2 1 190px;min-width:0}.controls input::placeholder{color:rgba(255,255,255,.4)}
    .controls select{flex:1 1 150px;min-width:0}
    .ctl-btn{background:rgba(255,255,255,.05);border:1px solid rgba(198,255,0,.25);border-radius:8px;font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--silver);padding:0 12px;min-height:44px;white-space:nowrap}
    .ctl-btn.active,.ctl-btn:hover{background:var(--yellow);color:var(--ink-dark);border-color:var(--yellow)}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:14px 0}
    .summary-card{border:1px solid var(--card-line);border-radius:12px;background:rgba(255,255,255,.035);padding:13px 14px}
    .summary-card b{display:block;font-family:var(--display);font-size:28px;color:var(--yellow);line-height:1}.summary-card span{font-family:var(--display);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--silver)}
    .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-top:14px}
    .board{background:var(--card);border:1px solid var(--card-line);border-radius:14px;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.18)}
    .board-head{padding:14px 16px;background:linear-gradient(90deg,rgba(109,40,217,.35),rgba(109,40,217,.08));display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
    .board-title{font-family:var(--display);font-size:clamp(19px,3vw,25px);font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#fff;line-height:1}
    .board-title span{color:var(--yellow)}
    .board-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px}
    .board-kind{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--silver);white-space:nowrap}
    .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{border-collapse:collapse;width:100%;font-size:13px}
    th{font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--silver);background:rgba(109,40,217,.20);padding:8px 10px;text-align:left;white-space:nowrap}
    td{padding:8px 10px;border-top:1px solid rgba(255,255,255,.06);white-space:nowrap;color:#ddd6ea}
    td.num,th.num{text-align:center}.rank{font-family:var(--display);font-weight:900;color:var(--yellow);font-size:16px}.value{font-family:var(--display);font-weight:900;color:#fff;font-size:17px}.player{font-weight:700;color:#fff}.team{font-size:12px;color:var(--silver);max-width:180px;overflow:hidden;text-overflow:ellipsis}
    tr:hover td{background:rgba(255,255,255,.035)}
    .empty,.loading,.error{text-align:center;padding:60px 20px;color:rgba(255,255,255,.6)}.error{color:#ff9c9c}
    .hidden{display:none!important}
    #toTop{position:fixed;right:16px;bottom:16px;z-index:60;width:46px;height:46px;border-radius:50%;background:var(--yellow);color:var(--ink-dark);border:0;font-size:18px;font-weight:900;box-shadow:0 6px 20px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s}
    #toTop.show{opacity:1;pointer-events:auto}
    @media(max-width:700px){.metric-grid{grid-template-columns:1fr}.board-head{align-items:flex-start;flex-direction:column}.team{max-width:120px}.controls select{flex-basis:100%}html{scroll-padding-top:210px}}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">NCS Central Texas · GameChanger</div>
    <h1>Player Leaderboards</h1>
    <div class="sub">HR, triples, doubles, hits, RBI, runs, steals, walks, AVG, and pitching leaders by season or year.</div>
    <div class="toplinks">
      <a class="pill-link" href="gc-player-stats.html">Player Stats</a>
      <a class="pill-link" href="ncs-dashboard.html">NCS Dashboard</a>
    </div>
    <div class="meta" id="meta"></div>
  </header>

  <div class="controls">
    <input id="search" type="search" placeholder="Search player or team…" aria-label="Search player or team">
    <select id="mode" aria-label="Leaderboard group">
      <option value="overall">Overall</option>
      <option value="seasons">Per Season</option>
      <option value="years">Per Year</option>
    </select>
    <select id="period" aria-label="Season or year"><option value="Overall">Overall</option></select>
    <select id="section" aria-label="Stats section">
      <option value="batting">Batting</option>
      <option value="pitching">Pitching</option>
      <option value="all">Batting + Pitching</option>
    </select>
    <button class="ctl-btn active" id="hideEmpty" aria-pressed="true">Hide empty</button>
  </div>

  <div class="summary-grid" id="summary"></div>
  <div id="content"><div class="loading">Loading leaderboards…</div></div>
</div>
<button id="toTop" aria-label="Back to top">↑</button>

<script>
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt = v => (v === undefined || v === null || v === '') ? '–' : v;
const avgStr = v => typeof v === 'number' ? v.toFixed(3).replace(/^0/, '') : fmt(v);
const valueStr = (metric, row) => metric.key === 'AVG' ? avgStr(row.value) : fmt(row.value);

let DATA = null;

function selectedDataset() {
  const mode = document.getElementById('mode').value;
  const period = document.getElementById('period').value;
  if (mode === 'overall') return {label:'Overall', data: DATA.overall || {}};
  const group = DATA[mode] || {};
  return {label: period, data: group[period] || {}};
}

function metricMeta(section, key) {
  return ((DATA.metrics || {})[section] || []).find(m => m.key === key) || {key, label:key, abbr:key};
}

function teamText(row) {
  const labels = row.team_labels || [];
  return labels.length ? labels.join(' · ') : row.roster_team || '';
}

function rowMatches(row, q) {
  if (!q) return true;
  return (`${row.name} ${row.roster_team || ''} ${(row.team_labels || []).join(' ')}`).toLowerCase().includes(q);
}

function boardHTML(section, metricKey, rows) {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const hideEmpty = document.getElementById('hideEmpty').classList.contains('active');
  const metric = metricMeta(section, metricKey);
  const filtered = (rows || []).filter(r => rowMatches(r, q));
  if (hideEmpty && !filtered.length) return '';
  const body = filtered.map(r => `<tr>
    <td class="num rank">${esc(r.rank)}</td>
    <td class="num value">${esc(valueStr(metric, r))}</td>
    <td><div class="player">${esc(r.name)}</div><div class="team">${esc(teamText(r))}</div></td>
    <td class="num">${esc(fmt(r.GP))}</td>
    ${section === 'batting' ? `<td class="num">${esc(fmt(r.AB))}</td><td class="num">${esc(fmt(r.H))}</td><td class="num">${esc(fmt(r.RBI))}</td><td class="num">${esc(avgStr(r.AVG))}</td>` : `<td class="num">${esc(fmt(r.IP))}</td><td class="num">${esc(fmt(r.H))}</td>`}
  </tr>`).join('');
  const extraHead = section === 'batting' ? '<th class="num">AB</th><th class="num">H</th><th class="num">RBI</th><th class="num">AVG</th>' : '<th class="num">IP</th><th class="num">H</th>';
  return `<section class="board" data-section="${esc(section)}" data-metric="${esc(metricKey)}">
    <div class="board-head">
      <div><div class="board-title"><span>${esc(metric.abbr || metric.key)}</span> ${esc(metric.label || metric.key)}</div><div class="board-sub">Top players for selected group</div></div>
      <div class="board-kind">${section}</div>
    </div>
    <div class="tbl-scroll"><table>
      <tr><th class="num">#</th><th class="num">${esc(metric.abbr || metric.key)}</th><th>Player</th><th class="num">GP</th>${extraHead}</tr>
      ${body || `<tr><td colspan="8" class="empty">No matching players.</td></tr>`}
    </table></div>
  </section>`;
}

function updatePeriods() {
  const mode = document.getElementById('mode').value;
  const period = document.getElementById('period');
  period.innerHTML = '';
  if (mode === 'overall') {
    period.insertAdjacentHTML('beforeend', '<option value="Overall">Overall</option>');
    period.disabled = true;
    return;
  }
  period.disabled = false;
  Object.keys(DATA[mode] || {}).forEach(p => period.insertAdjacentHTML('beforeend', `<option value="${esc(p)}">${esc(p)}</option>`));
}

function renderSummary(dataset, label) {
  const battingBoards = Object.values(dataset.batting || {});
  const pitchingBoards = Object.values(dataset.pitching || {});
  const playerIds = new Set();
  [...battingBoards, ...pitchingBoards].forEach(rows => (rows || []).forEach(r => playerIds.add(r.player_id)));
  const maxHR = (dataset.batting?.HR || [])[0]?.value ?? 0;
  const maxHits = (dataset.batting?.H || [])[0]?.value ?? 0;
  const maxKs = (dataset.pitching?.SO || [])[0]?.value ?? 0;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><b>${esc(label)}</b><span>Selected Group</span></div>
    <div class="summary-card"><b>${playerIds.size}</b><span>Ranked Players</span></div>
    <div class="summary-card"><b>${esc(maxHR)}</b><span>Top HR Total</span></div>
    <div class="summary-card"><b>${esc(maxHits)}</b><span>Top Hits Total</span></div>
    <div class="summary-card"><b>${esc(maxKs)}</b><span>Top Pitching K</span></div>`;
}

function render() {
  const section = document.getElementById('section').value;
  const {label, data} = selectedDataset();
  renderSummary(data, label);
  const parts = [];
  if (section === 'batting' || section === 'all') {
    for (const key of Object.keys(data.batting || {})) parts.push(boardHTML('batting', key, data.batting[key]));
  }
  if (section === 'pitching' || section === 'all') {
    for (const key of Object.keys(data.pitching || {})) parts.push(boardHTML('pitching', key, data.pitching[key]));
  }
  document.getElementById('content').innerHTML = `<div class="metric-grid">${parts.join('')}</div>` || '<div class="empty">No leaderboard data yet.</div>';
}

fetch('reports/gc-player-leaders.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    DATA = data;
    document.getElementById('meta').textContent = `Updated ${new Date(data.generated_at).toLocaleString()} · ${Object.keys(data.seasons || {}).length} seasons · ${Object.keys(data.years || {}).length} years · limit ${data.limit || 25}`;
    updatePeriods();
    ['search','mode','period','section'].forEach(id => document.getElementById(id).addEventListener(id === 'search' ? 'input' : 'change', () => { if (id === 'mode') updatePeriods(); render(); }));
    document.getElementById('hideEmpty').addEventListener('click', e => { e.currentTarget.classList.toggle('active'); e.currentTarget.setAttribute('aria-pressed', e.currentTarget.classList.contains('active')); render(); });
    render();
  })
  .catch(err => {
    document.getElementById('summary').innerHTML = '';
    document.getElementById('content').innerHTML = `<div class="error">Could not load reports/gc-player-leaders.json (${esc(err.message)}).<br>Run <code>./export_gc_leaders.sh</code> after <code>gc_stats.db</code> exists, then serve this folder over HTTP.</div>`;
  });

const toTop = document.getElementById('toTop');
addEventListener('scroll', () => toTop.classList.toggle('show', scrollY > 600), {passive:true});
toTop.addEventListener('click', () => scrollTo({top:0, behavior:'smooth'}));
</script>
</body>
</html>
