name: Deploy NCS Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ncs-dashboard.html'
      - 'index.html'
      - 'assets/**'
      - 'snapshots/**'
      - 'reports/**'
      - 'discovered_teams.json'
      - '.nojekyll'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_attempt_1.outputs.page_url || steps.deploy_attempt_2.outputs.page_url || steps.deploy_attempt_3.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy to GitHub Pages (attempt 2)
        if: ${{ steps.deploy_attempt_1.outcome == 'failure' }}
        id: deploy_attempt_2
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy to GitHub Pages (attempt 3)
        if: ${{ steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure' }}
        id: deploy_attempt_3
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Fail after retries are exhausted
        if: ${{ steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure' && steps.deploy_attempt_3.outcome == 'failure' }}
        run: |
          echo "GitHub Pages deployment failed after 3 attempts."
          exit 1
