name: NCS Roster Watch

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: roster-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Run roster monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python ncs_monitor.py

      - name: Build dashboard Slack feed
        run: python build_dashboard_feed.py

      - name: Build team list
        run: python build_team_list.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all trackable changes
          git add snapshots/ discovered_teams.json reports/ || true

          # If nothing staged, exit early
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Commit local changes
          git commit -m "Update roster snapshot and alert feed"

          # Fetch and rebase, stashing any uncommitted changes first
          git stash --include-untracked || true
          git fetch origin main
          git rebase origin/main || {
            echo "Rebase failed, trying merge instead"
            git rebase --abort || true
            git merge origin/main --no-edit || true
          }
          git stash pop || true

          # Push with retry
          for i in 1 2 3 4; do
            git push && break
            echo "Push attempt $i failed, retrying in $((i * 2)) seconds..."
            sleep $((i * 2))
            git pull --rebase origin main || git pull origin main
          done
