<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#08040D"><title>Player Development Watch · GameChanger</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"><style>:root{--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--yellow:#c6ff00;--purple:#6d28d9;--bg:#08040d;--card:rgba(255,255,255,.05);--line:rgba(198,255,0,.16);--muted:#c7c2d1;--pad:clamp(12px,3vw,24px)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--body);background:radial-gradient(900px 600px at 80% -10%,rgba(109,40,217,.34),transparent 55%),linear-gradient(180deg,#120720,#08040d);color:#eee8fa;min-height:100vh}a{color:var(--yellow);text-decoration:none}.wrap{max-width:1260px;margin:auto;padding:0 var(--pad) 80px}header{text-align:center;padding:34px 0 16px}.kicker{font-family:var(--display);font-size:12px;letter-spacing:4px;color:var(--yellow);text-transform:uppercase}h1{font-family:var(--display);font-size:clamp(34px,7vw,72px);line-height:.92;text-transform:uppercase;color:#fff;margin-top:6px}.sub{color:rgba(255,255,255,.62);margin-top:10px}.toplinks{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:14px}.pill{font-family:var(--display);font-weight:800;font-size:12px;letter-spacing:1.3px;text-transform:uppercase;border:1px solid rgba(198,255,0,.25);border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.04);color:var(--muted)}.controls{position:sticky;top:0;z-index:20;margin:0 calc(-1 * var(--pad));padding:10px var(--pad);background:rgba(10,4,18,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px);display:flex;gap:8px;flex-wrap:wrap}.controls input,.controls select{background:rgba(255,255,255,.06);border:1px solid rgba(198,255,0,.25);border-radius:9px;color:#fff;min-height:44px;padding:10px 12px;font:inherit}.controls input{flex:2 1 220px}.controls select{flex:1 1 170px}.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:16px 0}.card,.board{background:var(--card);border:1px solid var(--line);border-radius:14px}.card{padding:14px}.card b{font-family:var(--display);font-size:32px;color:var(--yellow);display:block;line-height:1}.card span{font-family:var(--display);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px}.board{overflow:hidden}.board-head{padding:16px;background:linear-gradient(90deg,rgba(109,40,217,.34),rgba(109,40,217,.08))}.board-title{font-family:var(--display);font-size:26px;text-transform:uppercase;font-weight:900;color:#fff}.board-title span{color:var(--yellow)}.hint{font-size:12px;color:var(--muted);margin-top:3px}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{font-family:var(--display);font-size:11px;text-transform:uppercase;letter-spacing:1.1px;color:var(--muted);text-align:left;background:rgba(109,40,217,.20);padding:8px;white-space:nowrap}td{border-top:1px solid rgba(255,255,255,.06);padding:8px;white-space:nowrap}td.num,th.num{text-align:center}.player{font-weight:800;color:#fff}.team{font-size:12px;color:var(--muted)}.delta{font-family:var(--display);font-size:16px;font-weight:900;color:var(--yellow)}.bad{color:#ff9c9c}.empty,.loading,.error{text-align:center;padding:50px 18px;color:rgba(255,255,255,.6)}.error{color:#ff9c9c}@media(max-width:760px){.grid{grid-template-columns:1fr}.controls select{flex-basis:100%}}</style></head><body><div class="wrap"><header><div class="kicker">Coach Evaluation · Growth Signals</div><h1>Development Watch</h1><div class="sub">Recent trends, contact risks, under-the-radar players, speed threats, and pitching workload alerts.</div><div class="toplinks"><a class="pill" href="gc-coach-command.html">Coach Command</a><a class="pill" href="gc-lineup-builder.html">Lineup Builder</a><a class="pill" href="gc-player-stats.html">Player Stats</a></div><div class="sub" id="meta"></div></header><div class="controls"><input id="search" type="search" placeholder="Search player or team…"><select id="team"><option value="">All teams</option></select><select id="minGames"><option value="1">Min 1 game</option><option value="3" selected>Min 3 games</option><option value="5">Min 5 games</option><option value="10">Min 10 games</option></select></div><div class="summary" id="summary"></div><div class="grid" id="content"><div class="loading">Loading development boards…</div></div></div><script>const esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));const n=v=>Number(v||0);const avg=v=>n(v).toFixed(3).replace(/^0/,'');function allTeams(p){return [...new Set([p.roster_team,...(p.current_teams||[]),...(p.last_season_teams||[])].filter(Boolean))]}function bStat(g,k){return n((g.batting||{})[k])}function pStat(g,k){return n((g.pitching||{})[k])}function playerRow(id,p){const games=(p.games||[]).filter(g=>g.batting||g.pitching).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));const recent=games.slice(0,5);const old=games.slice(5);const tb=gs=>gs.reduce((a,g)=>a+bStat(g,'H')+bStat(g,'2B')+2*bStat(g,'3B')+3*bStat(g,'HR'),0);const ab=gs=>gs.reduce((a,g)=>a+bStat(g,'AB'),0);const h=gs=>gs.reduce((a,g)=>a+bStat(g,'H'),0);const so=gs=>gs.reduce((a,g)=>a+bStat(g,'SO'),0);const bb=gs=>gs.reduce((a,g)=>a+bStat(g,'BB'),0);const recentAvg=ab(recent)?h(recent)/ab(recent):0;const priorAvg=ab(old)?h(old)/ab(old):0;const totals=p.totals||{};const contact=n(totals.AB)?1-(n(totals.SO)/Math.max(1,n(totals.AB))):0;const pGames=games.filter(g=>g.pitching);const ip=pGames.reduce((a,g)=>a+pStat(g,'IP'),0);const k=pGames.reduce((a,g)=>a+pStat(g,'SO'),0);const er=pGames.reduce((a,g)=>a+pStat(g,'ER'),0);const trend=(recentAvg-priorAvg);const under= n(totals.AB)>=8 ? ((n(totals.BB)*2+n(totals.SB)*2+n(totals.RBI)+n(totals.R)+n(totals.H))/(n(totals.AB)+1)) : 0;return {id,name:p.name,team:p.roster_team,teams:allTeams(p),games:games.length,gp:n(totals.GP),ab:n(totals.AB),h:n(totals.H),avg:n(totals.AVG),bb:n(totals.BB),so:n(totals.SO),sb:n(totals.SB),rbi:n(totals.RBI),hr:n(totals.HR),xbh:n(totals['2B'])+n(totals['3B'])+n(totals.HR),contact,recentAvg,priorAvg,trend,under,ip,k,er,pGames:pGames.length,slug:ab(games)?tb(games)/ab(games):0}}function board(title,tag,rows,cols){return `<section class="board"><div class="board-head"><div class="board-title"><span>${esc(tag)}</span> ${esc(title)}</div><div class="hint">Coach-useful players to review, reward, or develop.</div></div><div class="table-wrap"><table><tr><th>#</th><th>Player</th><th>Team</th>${cols.map(c=>`<th class="num">${esc(c[0])}</th>`).join('')}</tr>${rows.map((r,i)=>`<tr><td class="num delta">${i+1}</td><td><div class="player">${esc(r.name)}</div></td><td><div class="team">${esc(r.team||r.teams[0]||'')}</div></td>${cols.map(c=>`<td class="num ${c[2]&&c[2](r)?'bad':''}">${esc(c[1](r))}</td>`).join('')}</tr>`).join('')||'<tr><td colspan="8" class="empty">No matching players.</td></tr>'}</table></div></section>`}let ROWS=[];function render(){const q=document.getElementById('search').value.toLowerCase();const team=document.getElementById('team').value;const mg=n(document.getElementById('minGames').value);const rows=ROWS.filter(r=>r.games>=mg && (!team||r.teams.includes(team)) && (!q||(`${r.name} ${r.teams.join(' ')}`).toLowerCase().includes(q)));const hot=[...rows].filter(r=>r.ab>=5).sort((a,b)=>b.trend-a.trend).slice(0,12);const contact=[...rows].filter(r=>r.ab>=8).sort((a,b)=>a.contact-b.contact).slice(0,12);const hidden=[...rows].filter(r=>r.ab>=8&&r.avg<.350).sort((a,b)=>b.under-a.under).slice(0,12);const speed=[...rows].sort((a,b)=>(b.sb*3+b.recentAvg*10)-(a.sb*3+a.recentAvg*10)).slice(0,12);const pitch=[...rows].filter(r=>r.pGames>0).sort((a,b)=>(b.ip+b.k*.25)-(a.ip+a.k*.25)).slice(0,12);document.getElementById('summary').innerHTML=`<div class="card"><b>${rows.length}</b><span>Players Showing</span></div><div class="card"><b>${hot.length}</b><span>Hot Watch</span></div><div class="card"><b>${contact.length}</b><span>Contact Review</span></div><div class="card"><b>${pitch.length}</b><span>Pitchers</span></div>`;document.getElementById('content').innerHTML=board('Heating Up','Hot',hot,[['Recent AVG',r=>avg(r.recentAvg)],['Prior AVG',r=>avg(r.priorAvg)],['ΔAVG',r=>(r.trend>=0?'+':'')+avg(r.trend)],['H',r=>r.h],['RBI',r=>r.rbi]])+board('Contact Development','Review',contact,[['Contact',r=>Math.round(r.contact*100)+'%',r=>r.contact<.55],['AB',r=>r.ab],['SO',r=>r.so],['BB',r=>r.bb],['AVG',r=>avg(r.avg)]])+board('Underrated Contributors','Value',hidden,[['Value',r=>r.under.toFixed(1)],['AVG',r=>avg(r.avg)],['BB',r=>r.bb],['SB',r=>r.sb],['RBI',r=>r.rbi]])+board('Speed Pressure','Run',speed,[['SB',r=>r.sb],['R',r=>n(r.r)],['Recent AVG',r=>avg(r.recentAvg)],['BB',r=>r.bb],['GP',r=>r.gp]])+board('Pitching Workload / Value','Pitch',pitch,[['IP',r=>r.ip],['K',r=>r.k],['ER',r=>r.er],['Games',r=>r.pGames],['K/IP',r=>r.ip?(r.k/r.ip).toFixed(2):'–']])}fetch('reports/gc-player-stats.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}).then(data=>{ROWS=Object.entries(data.players||{}).map(([id,p])=>playerRow(id,p));const teamSel=document.getElementById('team');[...new Set(ROWS.flatMap(r=>r.teams))].sort().forEach(t=>teamSel.insertAdjacentHTML('beforeend',`<option value="${esc(t)}">${esc(t)}</option>`));document.getElementById('meta').textContent=`Updated ${new Date(data.generated_at).toLocaleString()} · recent trend uses latest five matched games`;['search','team','minGames'].forEach(id=>document.getElementById(id).addEventListener(id==='search'?'input':'change',render));render()}).catch(e=>document.getElementById('content').innerHTML=`<div class="error">Could not load reports/gc-player-stats.json (${esc(e.message)}).</div>`);</script></body></html>
