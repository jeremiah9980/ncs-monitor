# ============================================================================
# NCS Roster Watch -- configuration (auto-discovery)
# ----------------------------------------------------------------------------
# DISCOVERY finds teams for you by reading the public "Who's Coming" list of
# each seed event, then keeping only the divisions + cities you want. You don't
# list teams by hand -- you list a few central-TX *events* and the area's teams
# fall out of them.
# ============================================================================

discovery:
  enabled: true

  # Keep teams whose division starts with any of these (matches "12U C", "10U B"...).
  age_prefixes: ["10U", "12U"]

  # Keep teams whose city is within 25 miles of Georgetown (78628).
  # Core Central TX cities for 25-mile radius discovery.
  central_tx_cities:
    # Georgetown area (0-10 miles)
    - Georgetown
    - Round Rock
    - Cedar Park
    - Leander
    - Hutto
    - Liberty Hill
    - Jarrell
    - Florence
    # Extended area (10-25 miles)
    - Austin
    - Pflugerville
    - Taylor
    - Manor
    - Lago Vista
    - Jonestown
    - Granger
    - Salado
    - Bertram
    - Elgin
    - Thrall

  # Seed events. Add the central-TX 12U tournaments you care about. Get an id by
  # opening the event on playncs.com and copying the number from the URL
  # (.../Events/Details/<ID>/...). You can paste either a bare id or a full
  # Who's-Coming URL. More events = wider coverage; the city filter keeps it
  # to your area regardless.
  events:
    - 12473     # 2026 Central Texas NCS 12U Summer State (Triple Points) Open 4GG
    - 13484     # 2026 NCS Central Texas Fall State (8U,10U,12U Open & C; filter by 12U)
    - 10093     # 2025 Central Texas NCS 12U Summer State (Class C)
    # - 7548    # 2024 Central Texas 12U Summer State (Open)
    # - "https://www.playncs.com/fastpitch!/Events/WhosComing/12345/your-2026-event"

  # Re-crawl the events at most this often (hours). Teams don't register/leave
  # every 30 min, so we cache the discovered list and refresh it daily.
  refresh_hours: 24
  cache_file: "discovered_teams.json"

# Optional: always-watched teams regardless of discovery (e.g. your own).
# Add teams here that you want tracked regardless of which events they play in.
teams:
  - url: "https://www.playncs.com/Fastpitch/Teams/Details/39016/bananas-2k15"
  - url: "https://www.playncs.com/fastpitch/Teams/Details/73839/texas-venom"
  - url: "https://www.playncs.com/fastpitch/Teams/Details/79552/ctx-bombers-meza"

# Be polite to the site: seconds between requests.
request_delay_seconds: 2
user_agent: "ncs-roster-watch/3.0 (personal roster monitor)"

snapshot_file: "snapshots/latest.json"

notify:
  github_issue:
    labels: ["roster-change"]
  slack:
    webhook_env: SLACK_WEBHOOK_URL
  # email:
  #   host_env: SMTP_HOST
  #   port_env: SMTP_PORT
  #   user_env: SMTP_USER
  #   pass_env: SMTP_PASS
  #   to: "you@example.com"
