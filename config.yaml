# ============================================================================
# NCS Roster Watch — configuration
# ----------------------------------------------------------------------------
# Each team you want to watch is a playNCS Team Details page. The simplest way
# to add one: open the team on playncs.com and copy the URL from the address
# bar into the list below. (A bare numeric id also works; the slug is cosmetic.)
# No API key or login is needed — these are public pages.
# ============================================================================

teams:
  # Confirmed example — Bananas 2k15 (Georgetown, TX):
  - url: "https://www.playncs.com/Fastpitch/Teams/Details/39016/bananas-2k15"

  # Add the rest of the teams you track, one per line, e.g.:
  # - url: "https://www.playncs.com/Fastpitch/Teams/Details/41465/hotshots-2k15-villegas"
  # - id: 39324        # Buzz Elite 2K15  (id-only form also works)

# Be polite to the site: seconds to wait between team fetches.
request_delay_seconds: 2
user_agent: "ncs-roster-watch/2.0 (personal roster monitor)"

snapshot_file: "snapshots/latest.json"

# --- Notifications (only fire when a roster actually changes) ---------------
notify:
  github_issue:                 # zero-config in Actions: uses GITHUB_TOKEN
    labels: ["roster-change"]

  # email:
  #   host_env: SMTP_HOST       # e.g. smtp.gmail.com
  #   port_env: SMTP_PORT       # e.g. 587
  #   user_env: SMTP_USER       # full email address
  #   pass_env: SMTP_PASS       # Gmail *app password*, not your login
  #   to: "you@example.com"

  # slack:
  #   webhook_env: SLACK_WEBHOOK_URL
